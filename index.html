<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="description" content="دعوة خطوبة رقمية فاخرة باللون الأسود والذهبي" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta property="og:title" content="دعوة خطوبة محمود وفاطمة" />
  <meta property="og:description" content="يشرفنا حضوركم ومشاركتكم فرحتنا" />
  <meta property="og:type" content="website" />

  <title>دعوة خطوبة | محمود & فاطمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@300;400;600;700;900&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet" />
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  color-scheme: dark;
  --black: #050505;
  --gold: #d8aa49;
  --gold-light: #f8df93;
  --gold-deep: #8b6422;
  --cream: #fff5d7;
  --red: #a51e31;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html {
  min-height: 100%;
  scroll-behavior: smooth;
}

body {
  min-height: 100svh;
  font-family: "Cairo", Tahoma, Arial, sans-serif;
  color: var(--cream);
  background:
    radial-gradient(circle at 50% -10%, rgba(248, 223, 147, 0.18), transparent 32rem),
    radial-gradient(circle at 0% 30%, rgba(216, 170, 73, 0.07), transparent 22rem),
    radial-gradient(circle at 100% 80%, rgba(216, 170, 73, 0.08), transparent 22rem),
    linear-gradient(145deg, #010101 0%, #11100e 48%, #020202 100%);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    linear-gradient(115deg, transparent 0%, rgba(255, 255, 255, 0.025) 38%, transparent 44%),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.013) 0 1px, transparent 1px 6px);
  opacity: 0.65;
  mix-blend-mode: screen;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.18) 42%, rgba(0, 0, 0, 0.62) 100%);
}

.particles-canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.gold-frame {
  position: fixed;
  inset: max(8px, var(--safe-top)) 8px max(8px, var(--safe-bottom)) 8px;
  z-index: 3;
  border: 1px solid rgba(248, 223, 147, 0.25);
  border-radius: 22px;
  pointer-events: none;
}

.corner {
  position: fixed;
  width: min(44vw, 190px);
  height: min(44vw, 190px);
  z-index: 3;
  pointer-events: none;
  opacity: 0.62;
  border-color: rgba(248, 223, 147, 0.52);
}

.corner--top {
  top: calc(16px + var(--safe-top));
  left: 16px;
  border-top: 1px solid;
  border-left: 1px solid;
  border-radius: 18px 0 0 0;
}

.corner--bottom {
  right: 16px;
  bottom: calc(16px + var(--safe-bottom));
  border-bottom: 1px solid;
  border-right: 1px solid;
  border-radius: 0 0 18px 0;
}

.corner::after {
  content: "";
  position: absolute;
  inset: 11px;
  border-color: rgba(216, 170, 73, 0.26);
}

.corner--top::after {
  border-top: 1px solid;
  border-left: 1px solid;
  border-radius: 12px 0 0 0;
}

.corner--bottom::after {
  border-bottom: 1px solid;
  border-right: 1px solid;
  border-radius: 0 0 12px 0;
}

.splash {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at center, rgba(216, 170, 73, 0.14), transparent 18rem),
    #000;
  transition: opacity 0.85s ease, visibility 0.85s ease;
}

.splash.is-hidden {
  opacity: 0;
  visibility: hidden;
}

.splash__content {
  width: min(92vw, 420px);
  text-align: center;
}

.splash__bismillah {
  font-family: "Aref Ruqaa", serif;
  font-size: clamp(2.25rem, 9vw, 4rem);
  line-height: 1.5;
  color: var(--gold-light);
  text-shadow: 0 0 24px rgba(248, 223, 147, 0.42);
  opacity: 0;
  transform: translateY(18px);
  animation: fadeUp 0.9s ease forwards 0.2s;
}

.rings-logo {
  position: relative;
  width: 130px;
  height: 92px;
  margin: 28px auto 0;
  opacity: 0;
  transform: scale(0.86);
  filter: drop-shadow(0 0 18px rgba(248, 223, 147, 0.36));
  animation: logoPop 0.8s cubic-bezier(.2, 1.45, .5, 1) forwards 1s;
}

.ring {
  position: absolute;
  bottom: 0;
  width: 60px;
  height: 60px;
  border: 4px solid var(--gold-light);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(248, 223, 147, 0.12), transparent 58%);
  box-shadow: inset 0 0 18px rgba(216, 170, 73, 0.28), 0 0 18px rgba(216, 170, 73, 0.24);
}

.ring--left {
  left: 24px;
  transform: rotate(-12deg);
}

.ring--right {
  right: 24px;
  transform: rotate(12deg);
}

.diamond {
  position: absolute;
  top: 1px;
  left: 50%;
  width: 28px;
  height: 28px;
  border: 3px solid var(--gold-light);
  background: rgba(248, 223, 147, 0.1);
  transform: translateX(-50%) rotate(45deg);
  box-shadow: 0 0 24px rgba(248, 223, 147, 0.52);
}

.splash__line {
  display: block;
  width: 0;
  height: 1px;
  margin: 28px auto 0;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  box-shadow: 0 0 16px rgba(248, 223, 147, 0.55);
  animation: lineGrow 0.95s ease forwards 1.45s;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes logoPop {
  to { opacity: 1; transform: scale(1); }
}

@keyframes lineGrow {
  to { width: 74%; }
}

.app {
  position: relative;
  z-index: 4;
  width: min(100%, 520px);
  margin: 0 auto;
  padding: calc(24px + var(--safe-top)) 14px calc(42px + var(--safe-bottom));
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}

.app.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.75s ease, transform 0.75s ease;
}

.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.invitation-card {
  position: relative;
  margin: 0 auto 24px;
  padding: 7px;
  border: 1px solid rgba(248, 223, 147, 0.52);
  border-radius: 24px;
  background: linear-gradient(145deg, rgba(248, 223, 147, 0.18), rgba(216, 170, 73, 0.03), rgba(248, 223, 147, 0.12));
  box-shadow: 0 0 28px rgba(216, 170, 73, 0.19), 0 20px 60px rgba(0, 0, 0, 0.58);
  overflow: hidden;
}

.invitation-card::before {
  content: "";
  position: absolute;
  inset: -70px;
  z-index: 2;
  background: linear-gradient(115deg, transparent 35%, rgba(248, 223, 147, 0.26), transparent 57%);
  transform: translateX(120%) rotate(8deg);
  animation: cardShine 5.8s ease-in-out infinite;
  pointer-events: none;
}

@keyframes cardShine {
  0%, 48% { transform: translateX(120%) rotate(8deg); }
  76%, 100% { transform: translateX(-120%) rotate(8deg); }
}

.invitation-card img {
  display: block;
  width: 100%;
  aspect-ratio: 3 / 2;
  object-fit: cover;
  border-radius: 18px;
  background: #030303;
}

.content,
.footer {
  text-align: center;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  border: 1px solid rgba(248, 223, 147, 0.26);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.24);
  color: rgba(255, 245, 215, 0.78);
  font-size: 0.86rem;
}

.date {
  margin-top: 10px;
  font-family: "Reem Kufi", "Cairo", sans-serif;
  font-size: clamp(2.45rem, 13vw, 4.5rem);
  line-height: 1;
  letter-spacing: 0.08em;
  direction: ltr;
  color: var(--gold-light);
  text-shadow: 0 0 24px rgba(216, 170, 73, 0.36);
}

.countdown {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 7px;
  margin: 22px auto 26px;
}

.time-box {
  position: relative;
  padding: 13px 4px 11px;
  border: 1px solid rgba(248, 223, 147, 0.34);
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.018));
  box-shadow: inset 0 0 20px rgba(216, 170, 73, 0.04), 0 12px 30px rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(10px);
  overflow: hidden;
}

.time-box::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(248, 223, 147, 0.12), transparent 60%);
  pointer-events: none;
}

.time-box strong {
  position: relative;
  display: block;
  font-family: "Reem Kufi", "Cairo", sans-serif;
  font-size: clamp(1.45rem, 8vw, 2.4rem);
  line-height: 1;
  color: var(--gold-light);
  text-shadow: 0 0 18px rgba(248, 223, 147, 0.3);
}

.time-box span {
  position: relative;
  display: block;
  margin-top: 6px;
  font-size: 0.72rem;
  color: rgba(255, 245, 215, 0.68);
}

.ornament {
  position: relative;
  width: min(78%, 320px);
  height: 1px;
  margin: 0 auto;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  box-shadow: 0 0 18px rgba(216, 170, 73, 0.38);
}

.ornament::before,
.ornament::after {
  content: "◆";
  position: absolute;
  top: 50%;
  color: var(--gold-light);
  font-size: 0.75rem;
  text-shadow: 0 0 12px rgba(248, 223, 147, 0.58);
  transform: translateY(-52%);
}

.ornament::before { right: calc(50% + 16px); }
.ornament::after { left: calc(50% + 16px); }

.invite-text {
  min-height: 86px;
  display: grid;
  place-items: center;
  margin: 10px auto;
  padding: 0 6px;
  font-family: "Aref Ruqaa", serif;
  font-size: clamp(1.62rem, 7.4vw, 2.35rem);
  line-height: 1.75;
  color: var(--cream);
  text-shadow: 0 0 22px rgba(216, 170, 73, 0.18);
}

.names {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
  margin: 24px 0 20px;
}

.names span:not(.heart) {
  font-family: "Aref Ruqaa", serif;
  font-size: clamp(2.65rem, 14vw, 4.8rem);
  line-height: 1;
  color: var(--gold-light);
  text-shadow: 0 0 14px rgba(248, 223, 147, 0.32), 0 5px 0 rgba(94, 65, 20, 0.35);
  white-space: nowrap;
}

.heart {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(248, 223, 147, 0.45);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(165, 30, 49, 0.96), rgba(70, 5, 14, 0.88));
  color: #fff;
  font-size: 1.4rem;
  box-shadow: 0 0 24px rgba(165, 30, 49, 0.48), 0 0 18px rgba(248, 223, 147, 0.18);
  animation: heartbeat 1.55s ease-in-out infinite;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  18% { transform: scale(1.12); }
  32% { transform: scale(0.96); }
  48% { transform: scale(1.08); }
}

.details {
  margin: 16px auto 18px;
  padding: 18px 14px;
  border: 1px solid rgba(248, 223, 147, 0.32);
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.014)), rgba(0, 0, 0, 0.18);
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
  backdrop-filter: blur(10px);
}

.details p {
  font-size: clamp(1rem, 4.8vw, 1.4rem);
  line-height: 1.8;
  color: rgba(255, 245, 215, 0.9);
}

.details strong,
.details .blessing {
  display: block;
  color: var(--gold-light);
  font-weight: 900;
  font-size: clamp(1.15rem, 5.3vw, 1.65rem);
  line-height: 1.8;
  text-shadow: 0 0 14px rgba(216, 170, 73, 0.24);
}

.actions {
  display: grid;
  gap: 10px;
  margin-top: 22px;
}

.btn {
  position: relative;
  min-height: 52px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 18px;
  border: 1px solid rgba(248, 223, 147, 0.55);
  border-radius: 999px;
  font-family: "Cairo", sans-serif;
  font-size: 1rem;
  font-weight: 900;
  text-decoration: none;
  cursor: pointer;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.btn--primary {
  color: #140d03;
  background: linear-gradient(135deg, #8b6422, #f8df93 42%, #c79633 76%, #fff0b1);
  box-shadow: 0 0 24px rgba(216, 170, 73, 0.22), 0 16px 38px rgba(0, 0, 0, 0.34);
}

.btn--ghost {
  color: var(--gold-light);
  background: rgba(0, 0, 0, 0.32);
}

.btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent, rgba(255, 255, 255, 0.46), transparent);
  transform: translateX(120%);
  transition: transform 0.7s ease;
}

.btn:active {
  transform: translateY(1px) scale(0.99);
}

.btn:hover::before {
  transform: translateX(-120%);
}

.footer {
  margin-top: 36px;
  padding-bottom: 8px;
  color: rgba(255, 245, 215, 0.72);
}

.footer p {
  margin-top: 12px;
  font-family: "Aref Ruqaa", serif;
  font-size: clamp(1.8rem, 8vw, 2.8rem);
  color: var(--gold-light);
  text-shadow: 0 0 18px rgba(216, 170, 73, 0.22);
}

.footer span {
  display: block;
  margin-top: 4px;
  font-size: 0.92rem;
}

.music-btn {
  position: fixed;
  left: max(14px, env(safe-area-inset-left, 0px));
  bottom: max(14px, env(safe-area-inset-bottom, 0px));
  z-index: 20;
  width: 50px;
  height: 50px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(248, 223, 147, 0.5);
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.62);
  color: var(--gold-light);
  font-size: 1.35rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 22px rgba(216, 170, 73, 0.22);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.music-btn.is-playing {
  animation: musicPulse 1.6s ease-in-out infinite;
}

@keyframes musicPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(216, 170, 73, 0.22); }
  50% { box-shadow: 0 0 34px rgba(248, 223, 147, 0.48); }
}

.toast {
  position: fixed;
  right: 50%;
  bottom: calc(24px + var(--safe-bottom));
  z-index: 30;
  max-width: calc(100vw - 32px);
  padding: 11px 16px;
  border: 1px solid rgba(248, 223, 147, 0.44);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.8);
  color: var(--gold-light);
  font-size: 0.92rem;
  opacity: 0;
  transform: translateX(50%) translateY(24px);
  pointer-events: none;
  transition: 0.3s ease;
  backdrop-filter: blur(10px);
}

.toast.is-visible {
  opacity: 1;
  transform: translateX(50%) translateY(0);
}

@media (min-width: 640px) {
  .app {
    width: min(92vw, 760px);
    padding-inline: 20px;
  }

  .actions {
    grid-template-columns: 1fr 1fr;
  }

  .invitation-card {
    border-radius: 30px;
    padding: 10px;
  }

  .invitation-card img {
    border-radius: 22px;
  }
}

@media (min-width: 960px) {
  .app {
    width: min(92vw, 980px);
  }
}

@media (max-width: 360px) {
  .countdown {
    gap: 5px;
  }

  .time-box {
    padding-inline: 2px;
  }

  .names {
    gap: 6px;
  }

  .heart {
    width: 40px;
    height: 40px;
    font-size: 1.15rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

  </style>
</head>
<body>
  <canvas class="particles-canvas" id="particlesCanvas" aria-hidden="true"></canvas>

  <div class="splash" id="splash" aria-label="شاشة افتتاح الدعوة">
    <div class="splash__content">
      <p class="splash__bismillah">بسم الله الرحمن الرحيم</p>
      <div class="rings-logo" aria-hidden="true">
        <span class="diamond"></span>
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <span class="splash__line"></span>
    </div>
  </div>

  <div class="gold-frame" aria-hidden="true"></div>
  <div class="corner corner--top" aria-hidden="true"></div>
  <div class="corner corner--bottom" aria-hidden="true"></div>

  <button class="music-btn" id="musicToggle" type="button" aria-label="تشغيل أو إيقاف الموسيقى">
    <span id="musicIcon">♪</span>
  </button>
  <audio id="backgroundMusic" loop preload="none" playsinline></audio>

  <script>
const CONFIG = window.INVITATION_CONFIG || {};
const $ = (selector) => document.querySelector(selector);

const state = {
  typingStarted: false,
  musicPlaying: false,
  toastTimer: null
};

document.addEventListener("DOMContentLoaded", () => {
  fillContent();
  setupSplash();
  setupCountdown();
  setupRevealAnimation();
  setupTypewriterTrigger();
  setupButtons();
  setupMusic();
  setupParticles();
});

function fillContent() {
  setText("#groomName", CONFIG.groomName || "محمود");
  setText("#brideName", CONFIG.brideName || "فاطمة");
  setText("#eventDateText", CONFIG.eventDateText || "30.04.2026");
  setText("#placeText", CONFIG.placeText || "أمام منزل العروسة");

  const mapButton = $("#mapButton");
  if (mapButton) mapButton.href = CONFIG.mapLink || "https://maps.google.com";

  const music = $("#backgroundMusic");
  if (music && CONFIG.musicFile) music.dataset.src = CONFIG.musicFile;
}

function setText(selector, value) {
  const element = $(selector);
  if (element) element.textContent = value;
}

function setupSplash() {
  const splash = $("#splash");
  const app = $("#app");

  window.setTimeout(() => {
    splash?.classList.add("is-hidden");
    app?.classList.add("is-visible");
    revealVisibleItems();
    startTypewriter();
  }, 2850);
}

function setupRevealAnimation() {
  const items = document.querySelectorAll(".reveal");

  if (!("IntersectionObserver" in window)) {
    items.forEach((item) => item.classList.add("is-visible"));
    return;
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add("is-visible");
      observer.unobserve(entry.target);
    });
  }, { threshold: 0.14 });

  items.forEach((item) => observer.observe(item));
}

function revealVisibleItems() {
  document.querySelectorAll(".reveal").forEach((item, index) => {
    window.setTimeout(() => item.classList.add("is-visible"), index * 115);
  });
}

function setupCountdown() {
  updateCountdown();
  window.setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const eventTime = new Date(CONFIG.eventDate || "2026-04-30T20:00:00").getTime();
  const now = Date.now();
  const diff = Math.max(0, eventTime - now);

  const second = 1000;
  const minute = second * 60;
  const hour = minute * 60;
  const day = hour * 24;

  const days = Math.floor(diff / day);
  const hours = Math.floor((diff % day) / hour);
  const minutes = Math.floor((diff % hour) / minute);
  const seconds = Math.floor((diff % minute) / second);

  setText("#days", String(days).padStart(2, "0"));
  setText("#hours", String(hours).padStart(2, "0"));
  setText("#minutes", String(minutes).padStart(2, "0"));
  setText("#seconds", String(seconds).padStart(2, "0"));
}

function setupTypewriterTrigger() {
  const text = $("#typewriterText");
  if (!text || !("IntersectionObserver" in window)) return;

  const observer = new IntersectionObserver((entries) => {
    if (entries.some((entry) => entry.isIntersecting)) {
      startTypewriter();
      observer.disconnect();
    }
  }, { threshold: 0.35 });

  observer.observe(text);
}

function startTypewriter() {
  if (state.typingStarted) return;
  state.typingStarted = true;

  const element = $("#typewriterText");
  const text = CONFIG.invitationText || "ندعوكم لحضور حفل خطوبة أجمل العروسين";
  if (!element) return;

  element.textContent = "";
  let index = 0;

  const interval = window.setInterval(() => {
    element.textContent += text[index] || "";
    index += 1;
    if (index >= text.length) window.clearInterval(interval);
  }, 62);
}

function setupButtons() {
  const shareButton = $("#shareButton");

  shareButton?.addEventListener("click", async () => {
    const title = `دعوة خطوبة ${CONFIG.groomName || "محمود"} و ${CONFIG.brideName || "فاطمة"}`;
    const text = `${title}\n${CONFIG.eventDateText || "30.04.2026"}\n${CONFIG.invitationText || "يشرفنا حضوركم"}`;
    const url = window.location.href;

    try {
      if (navigator.share) {
        await navigator.share({ title, text, url });
        return;
      }
      await navigator.clipboard.writeText(`${text}\n${url}`);
      showToast("تم نسخ رابط الدعوة");
    } catch (error) {
      showToast("لم يتم تنفيذ المشاركة");
    }
  });
}

function setupMusic() {
  const music = $("#backgroundMusic");
  const button = $("#musicToggle");
  const icon = $("#musicIcon");
  if (!music || !button) return;

  const audioUrl = CONFIG.musicFile || "music.mp3";
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;

  let audioContext = null;
  let audioBuffer = null;
  let sourceNode = null;
  let gainNode = null;
  let startedAt = 0;
  let pausedAt = 0;
  let loading = false;
  let usingFallbackAudio = false;

  music.preload = "none";
  music.loop = true;
  music.volume = 0.9;

  function updateMusicButton(isPlaying) {
    state.musicPlaying = isPlaying;
    button.classList.toggle("is-playing", isPlaying);
    button.setAttribute("aria-label", isPlaying ? "إيقاف الموسيقى" : "تشغيل الموسيقى");
    if (icon) icon.textContent = isPlaying ? "Ⅱ" : "♪";
  }

  function getAudioContext() {
    if (!AudioContextClass) return null;
    if (!audioContext) {
      audioContext = new AudioContextClass();
      gainNode = audioContext.createGain();
      gainNode.gain.value = 0.9;
      gainNode.connect(audioContext.destination);
    }
    return audioContext;
  }

  async function loadAudioBuffer() {
    if (audioBuffer) return audioBuffer;
    if (loading) {
      while (loading && !audioBuffer) {
        await new Promise((resolve) => setTimeout(resolve, 120));
      }
      if (audioBuffer) return audioBuffer;
    }

    loading = true;
    showToast("جاري تجهيز الموسيقى...");

    const context = getAudioContext();
    if (!context) throw new Error("Web Audio API is not available");

    const response = await fetch(audioUrl, { cache: "force-cache" });
    if (!response.ok) throw new Error("Cannot load audio file");

    const arrayBuffer = await response.arrayBuffer();
    audioBuffer = await context.decodeAudioData(arrayBuffer);
    loading = false;
    return audioBuffer;
  }

  function stopWebAudioSource() {
    if (!sourceNode) return;
    try {
      sourceNode.onended = null;
      sourceNode.stop(0);
      sourceNode.disconnect();
    } catch (error) {}
    sourceNode = null;
  }

  async function playWithWebAudio() {
    const context = getAudioContext();
    if (!context) throw new Error("No AudioContext");

    // لازم يحصل بعد ضغطة المستخدم، خصوصًا على iPhone و Android.
    if (context.state !== "running") {
      await context.resume();
    }

    const buffer = await loadAudioBuffer();

    if (context.state !== "running") {
      await context.resume();
    }

    stopWebAudioSource();

    const source = context.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    source.connect(gainNode);

    const offset = pausedAt % buffer.duration;
    source.start(0, offset);

    sourceNode = source;
    startedAt = context.currentTime - offset;
    updateMusicButton(true);
    showToast("تم تشغيل الموسيقى");
  }

  function pauseWebAudio() {
    if (!audioContext || !audioBuffer) return;
    pausedAt = (audioContext.currentTime - startedAt) % audioBuffer.duration;
    stopWebAudioSource();
    updateMusicButton(false);
  }

  async function playWithHtmlAudioFallback() {
    usingFallbackAudio = true;
    if (!music.src) music.src = audioUrl;
    music.currentTime = pausedAt || 0;
    await music.play();
    updateMusicButton(true);
    showToast("تم تشغيل الموسيقى");
  }

  function pauseHtmlAudioFallback() {
    pausedAt = music.currentTime || 0;
    music.pause();
    updateMusicButton(false);
  }

  button.addEventListener("click", async () => {
    try {
      if (state.musicPlaying) {
        if (usingFallbackAudio) pauseHtmlAudioFallback();
        else pauseWebAudio();
        return;
      }

      button.disabled = true;

      try {
        await playWithWebAudio();
        usingFallbackAudio = false;
      } catch (webAudioError) {
        await playWithHtmlAudioFallback();
      }
    } catch (error) {
      updateMusicButton(false);
      showToast("افتح الصفحة من Chrome أو Safari واضغط مرة أخرى");
    } finally {
      button.disabled = false;
    }
  });

  document.addEventListener("visibilitychange", async () => {
    if (!state.musicPlaying) return;

    // بعض الموبايلات بتعمل suspend للصوت عند رجوع الصفحة؛ نرجّعه بدون إعادة تحميل.
    if (!document.hidden && audioContext && audioContext.state === "suspended") {
      try { await audioContext.resume(); } catch (error) {}
    }
  });

  music.addEventListener("pause", () => {
    if (!usingFallbackAudio) return;
    if (state.musicPlaying && !music.ended) {
      window.setTimeout(() => music.play().catch(() => updateMusicButton(false)), 350);
    }
  });
}

function showToast(message) {
  const toast = $("#toast");
  if (!toast) return;

  toast.textContent = message;
  toast.classList.add("is-visible");
  window.clearTimeout(state.toastTimer);
  state.toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 1900);
}

function setupParticles() {
  const canvas = $("#particlesCanvas");
  if (!canvas) return;

  const ctx = canvas.getContext("2d");
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (!ctx || reduceMotion) return;

  let particles = [];
  let width = 0;
  let height = 0;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = `${width}px`;
    canvas.style.height = `${height}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    createParticles();
  }

  function createParticles() {
    const count = width < 520 ? 44 : 78;
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 1.6 + 0.35,
      speedX: (Math.random() - 0.5) * 0.16,
      speedY: Math.random() * 0.24 + 0.05,
      alpha: Math.random() * 0.5 + 0.12,
      twinkle: Math.random() * Math.PI * 2
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);

    particles.forEach((particle) => {
      particle.x += particle.speedX;
      particle.y += particle.speedY;
      particle.twinkle += 0.025;

      if (particle.y > height + 8) {
        particle.y = -8;
        particle.x = Math.random() * width;
      }
      if (particle.x < -8) particle.x = width + 8;
      if (particle.x > width + 8) particle.x = -8;

      const glow = Math.max(0.04, particle.alpha + Math.sin(particle.twinkle) * 0.14);
      const gradient = ctx.createRadialGradient(
        particle.x,
        particle.y,
        0,
        particle.x,
        particle.y,
        particle.radius * 5
      );
      gradient.addColorStop(0, `rgba(248, 223, 147, ${glow})`);
      gradient.addColorStop(1, "rgba(248, 223, 147, 0)");

      ctx.beginPath();
      ctx.fillStyle = gradient;
      ctx.arc(particle.x, particle.y, particle.radius * 5, 0, Math.PI * 2);
      ctx.fill();
    });

    window.requestAnimationFrame(draw);
  }

  resize();
  draw();
  window.addEventListener("resize", resize, { passive: true });
}

  </script>
